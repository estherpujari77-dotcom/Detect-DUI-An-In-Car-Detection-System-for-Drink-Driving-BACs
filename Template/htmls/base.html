<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Detection DUI in Car - Drunk and Driving{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #e0e0e0;
        }
        nav {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 65px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: #00d4ff;
            letter-spacing: 1px;
            text-decoration: none;
        }
        .nav-brand span { color: #ff6b6b; }
        .nav-links a {
            color: #ccc;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
        }
        .nav-links .btn-logout {
            background: rgba(255,107,107,0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255,107,107,0.3);
        }
        .nav-links .btn-logout:hover { background: rgba(255,107,107,0.3); }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,212,255,0.2);
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,212,255,0.4); }
        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #cc0000);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
        }
        .btn-warning {
            background: linear-gradient(135deg, #ff9800, #e65100);
            color: white;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #aaa;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
        }
        .alert {
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        .alert-danger { background: rgba(255,107,107,0.15); border: 1px solid rgba(255,107,107,0.3); color: #ff6b6b; }
        .alert-success { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); color: #4caf50; }
        .alert-warning { background: rgba(255,152,0,0.15); border: 1px solid rgba(255,152,0,0.3); color: #ff9800; }
        .table { width: 100%; border-collapse: collapse; }
        .table th {
            background: rgba(0,212,255,0.1);
            color: #00d4ff;
            padding: 12px 15px;
            text-align: left;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .table td { padding: 11px 15px; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.9rem; }
        .table tr:hover td { background: rgba(255,255,255,0.03); }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .badge-danger { background: rgba(255,107,107,0.2); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.4); }
        .badge-success { background: rgba(76,175,80,0.2); color: #4caf50; border: 1px solid rgba(76,175,80,0.4); }
        .badge-warning { background: rgba(255,152,0,0.2); color: #ff9800; border: 1px solid rgba(255,152,0,0.4); }
        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.82rem;
            margin-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    {% block nav %}{% endblock %}
    {% block content %}{% endblock %}
    <footer>
        &copy; 2024 Detection DUI in Car - Drunk and Driving &mdash; AI/ML Powered Drunk &amp; Driving Detection
    </footer>
</body>
</html>
